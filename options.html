<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>跳转秒数设置</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
                   "Helvetica Neue", "Microsoft YaHei", sans-serif;
      background: #ffffff;
      color: #0f0f0f;
      padding: 18px 18px 16px;
      user-select: none;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #ff0000, #cc0000);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(255, 0, 0, 0.25);
    }

    .logo svg { width: 18px; height: 18px; fill: #fff; }

    .title {
      font-size: 14px;
      font-weight: 600;
      color: #0f0f0f;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 11px;
      color: #606060;
      margin-top: 2px;
    }

    .field {
      background: #f8f8f8;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .field-label {
      font-size: 12px;
      color: #606060;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stepper {
      width: 28px;
      height: 32px;
      border: 1px solid #e5e5e5;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      color: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-weight: 500;
    }
    .stepper:hover { background: #f1f1f1; border-color: #d0d0d0; }
    .stepper:active { transform: scale(0.94); }

    input[type="number"] {
      flex: 1;
      height: 32px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      color: #0f0f0f;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"]:focus {
      border-color: #ff0000;
      box-shadow: 0 0 0 3px rgba(255, 0, 0, 0.12);
    }

    .unit {
      font-size: 12px;
      color: #909090;
      min-width: 16px;
    }

    .presets {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .preset {
      flex: 1;
      padding: 6px 0;
      font-size: 11px;
      border: 1px solid #e5e5e5;
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
      color: #606060;
      transition: all 0.15s;
    }
    .preset:hover { background: #f1f1f1; color: #0f0f0f; }
    .preset.active {
      background: #0f0f0f;
      color: #fff;
      border-color: #0f0f0f;
    }

    .save-btn {
      width: 100%;
      height: 36px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #ff0000, #cc0000);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 2px 6px rgba(255, 0, 0, 0.2);
      letter-spacing: 0.5px;
    }
    .save-btn:hover { box-shadow: 0 4px 12px rgba(255, 0, 0, 0.32); transform: translateY(-1px); }
    .save-btn:active { transform: translateY(0); box-shadow: 0 2px 4px rgba(255, 0, 0, 0.2); }
    .save-btn.saved {
      background: linear-gradient(135deg, #2ba640, #1f8a32);
      box-shadow: 0 2px 6px rgba(43, 166, 64, 0.25);
    }

    .footer {
      margin-top: 12px;
      font-size: 10.5px;
      color: #909090;
      text-align: center;
      line-height: 1.5;
    }
    .kbd {
      display: inline-block;
      padding: 1px 5px;
      border: 1px solid #d0d0d0;
      border-bottom-width: 2px;
      border-radius: 4px;
      background: #fafafa;
      font-family: ui-monospace, Menlo, monospace;
      font-size: 10px;
      color: #303030;
      margin: 0 2px;
    }

    .platform-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .platform-badge.yt   { background: rgba(255,0,0,0.08); color: #cc0000; }
    .platform-badge.bili { background: rgba(251,114,153,0.1); color: #fb7299; }

    .bili-field input[type="number"]:focus {
      border-color: #fb7299;
      box-shadow: 0 0 0 3px rgba(251, 114, 153, 0.12);
    }
    .bili-preset.active {
      background: #fb7299;
      border-color: #fb7299;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M10 16.5l6-4.5-6-4.5v9zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
    </div>
    <div>
      <div class="title">跳转秒数设置</div>
      <div class="subtitle">YouTube · 哔哩哔哩</div>
    </div>
  </div>

  <div class="field">
    <div class="field-label">
      <span class="platform-badge yt">▶ YouTube</span>
      <span>跳转秒数</span>
    </div>
    <div class="input-wrap">
      <button class="stepper" id="ytMinus" type="button">−</button>
      <input type="number" id="ytSeekStep" min="0.5" step="0.5" value="2">
      <button class="stepper" id="ytPlus" type="button">+</button>
      <span class="unit">秒</span>
    </div>
    <div class="presets">
      <button class="preset yt-preset" data-val="1" type="button">1s</button>
      <button class="preset yt-preset" data-val="2" type="button">2s</button>
      <button class="preset yt-preset" data-val="5" type="button">5s</button>
      <button class="preset yt-preset" data-val="10" type="button">10s</button>
    </div>
  </div>

  <div class="field bili-field">
    <div class="field-label">
      <span class="platform-badge bili">哔哩哔哩</span>
      <span>跳转秒数</span>
    </div>
    <div class="input-wrap">
      <button class="stepper" id="biliMinus" type="button">−</button>
      <input type="number" id="biliSeekStep" min="0.5" step="0.5" value="2">
      <button class="stepper" id="biliPlus" type="button">+</button>
      <span class="unit">秒</span>
    </div>
    <div class="presets">
      <button class="preset bili-preset" data-val="1" type="button">1s</button>
      <button class="preset bili-preset" data-val="2" type="button">2s</button>
      <button class="preset bili-preset" data-val="5" type="button">5s</button>
      <button class="preset bili-preset" data-val="10" type="button">10s</button>
    </div>
  </div>

  <button class="save-btn" id="save" type="button">保存设置</button>

  <div class="footer">
    使用 <span class="kbd">←</span> <span class="kbd">→</span> 进行快速跳转
  </div>

  <script src="options.js"></script>
</body>
</html>
